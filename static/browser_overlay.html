<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TT Live Regie Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=Merriweather:wght@400;700;900&family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700;800;900&family=Poppins:wght@400;600;700;800;900&display=swap');
    :root {
      --bg: #050608;
      --text: #fff7ea;
      --muted: #d6c9b8;
      --accent: #ff4fd8;
      --accent2: #29f3ff;
      --panel: rgba(8, 10, 16, .62);
      --cloud-x: 50%;
      --cloud-y: 50%;
      --cloud-w: 58%;
      --cloud-h: 58%;
      --topic-font: Poppins, Inter, Arial, Helvetica, system-ui, sans-serif;
      --keyword-font: Inter, Arial, Helvetica, system-ui, sans-serif;
      --topic-weight: 900;
      --keyword-weight: 780;
      --topic-transform: none;
      --dim: .22;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050608;
      color: var(--text);
      font-family: Inter, Arial, Helvetica, system-ui, sans-serif;
    }
    body.transparent { background: transparent; }
    .stage-wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: transparent;
    }
    .stage {
      position: relative;
      width: min(74vh, 100vw);
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 76% 18%, rgba(255, 79, 216, .22), transparent 30%),
        radial-gradient(circle at 10% 78%, rgba(41, 243, 255, .20), transparent 34%),
        var(--bg);
      isolation: isolate;
    }
    body.transparent .stage { background: transparent; }
    .stage.frame { outline: 1px solid rgba(255, 79, 216, .45); outline-offset: -1px; }
    .bg {
      position: absolute;
      inset: -5%;
      z-index: -4;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: 50% 50%;
      opacity: 1;
      filter: brightness(1.05);
      transform: scale(1);
    }
    .veil {
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(90deg, rgba(0,0,0,var(--dim)), rgba(0,0,0,.08) 62%, rgba(0,0,0,.04)),
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,var(--dim)));
      pointer-events: none;
    }
    body.transparent .veil { background: transparent; }
    .topic {
      position: absolute;
      left: var(--topic-x, 36%);
      top: var(--topic-y, 18%);
      width: var(--topic-w, 68%);
      min-height: var(--topic-h, 24%);
      transform: translate(-50%, -50%);
      overflow: hidden;
      font-family: var(--topic-font);
      font-size: clamp(38px, 7.8vw, 82px);
      line-height: .96;
      font-weight: var(--topic-weight);
      letter-spacing: 0;
      text-transform: var(--topic-transform);
      text-shadow: 0 10px 32px rgba(0,0,0,.50);
      z-index: 4;
    }
    .topic:after {
      content: "";
      display: block;
      width: 76px;
      height: 4px;
      margin-top: 18px;
      border-radius: 99px;
      background: var(--accent);
      box-shadow: 0 0 24px rgba(255, 79, 216, .70);
    }
    .clock {
      position: absolute;
      left: var(--clock-x, 82%);
      top: var(--clock-y, 12%);
      width: var(--clock-w, 24%);
      min-height: var(--clock-h, 9%);
      transform: translate(-50%, -50%);
      z-index: 6;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: var(--panel);
      font-weight: 900;
      font-size: clamp(14px, 1.7vw, 20px);
      line-height: 1.08;
      backdrop-filter: blur(12px);
    }
    .clock span { color: var(--muted); font-size: .76em; }
    .cloud {
      position: absolute;
      left: var(--cloud-x);
      top: var(--cloud-y);
      width: var(--cloud-w);
      height: var(--cloud-h);
      transform: translate(-50%, -50%);
      z-index: 5;
    }
    .kw {
      position: absolute;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%) rotate(var(--r)) scale(var(--s));
      transform-origin: center;
      white-space: nowrap;
      padding: .18rem .42rem;
      border-radius: 8px;
      background: rgba(10, 12, 20, .64);
      border: 1px solid rgba(255,255,255,.16);
      color: var(--text);
      font-family: var(--keyword-font);
      font-size: clamp(13px, 2.2vw, 24px);
      line-height: 1;
      font-weight: var(--w, var(--keyword-weight));
      text-shadow: 0 4px 18px rgba(0,0,0,.36);
      box-shadow: 0 10px 26px rgba(0,0,0,.18);
      animation: floaty var(--d) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    .kw.c0 { color: var(--accent); }
    .kw.c1 { color: var(--accent2); }
    .kw.c2 { color: #b8ff4f; }
    .kw.c3 { color: #fff7ea; }
    .kw.c4 { color: #ffd166; }
    .kw.c5 { color: #ff7a7a; }
    .kw.manual {
      z-index: 8;
      text-transform: uppercase;
      color: #ffffff;
      background: linear-gradient(90deg, rgba(255,79,216,.52), rgba(41,243,255,.36));
      border-color: rgba(255,255,255,.42);
      box-shadow: 0 0 42px rgba(255,79,216,.45), 0 14px 34px rgba(0,0,0,.32);
    }
    .countdown {
      position: absolute;
      left: 7%;
      bottom: 18%;
      z-index: 6;
      min-width: 220px;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.18);
      background: var(--panel);
      backdrop-filter: blur(12px);
    }
    .countdown b { display: block; color: var(--muted); font-size: 14px; }
    .countdown span { display: block; font-size: 34px; font-weight: 900; line-height: 1; margin-top: 2px; }
    .video-layer {
      position: absolute;
      left: var(--video-x, 50%);
      top: var(--video-y, 54%);
      width: var(--video-w, 70%);
      height: var(--video-h, 40%);
      transform: translate(-50%, -50%);
      z-index: 7;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.20);
      background: #050608;
      box-shadow: 0 18px 48px rgba(0,0,0,.42);
      opacity: var(--video-o, 1);
    }
    .video-layer iframe,
    .video-layer video {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #050608;
    }
    .video-layer video { object-fit: var(--video-fit, contain); }
    .video-controls {
      position: absolute;
      left: var(--video-x, 50%);
      top: calc(var(--video-y, 54%) + var(--video-h, 40%) / 2 + 20px);
      transform: translateX(-50%);
      z-index: 8;
      display: flex;
      gap: 8px;
    }
    .video-controls button {
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.62);
      color: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      cursor: pointer;
    }
    .web-layer {
      position: absolute;
      left: var(--web-x, 50%);
      top: var(--web-y, 54%);
      width: var(--web-w, 76%);
      height: var(--web-h, 58%);
      transform: translate(-50%, -50%);
      z-index: 6;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,79,216,.44);
      background: rgba(5,6,8,.92);
      box-shadow: 0 18px 48px rgba(0,0,0,.42);
    }
    .web-layer iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }
    .web-card {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 36px;
      background:
        radial-gradient(circle at 80% 8%, rgba(255,79,216,.18), transparent 30%),
        linear-gradient(135deg, rgba(14,16,26,.96), rgba(0,0,0,.86));
      color: var(--text);
    }
    .web-card .eyebrow {
      color: var(--accent);
      font-size: clamp(12px, 1.6vw, 18px);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 18px;
      word-break: break-word;
    }
    .web-card b {
      display: block;
      font-size: clamp(34px, 7.8vw, 74px);
      line-height: .95;
      margin-bottom: 22px;
      word-break: break-word;
    }
    .web-card p {
      margin: 0;
      max-width: 96%;
      color: #cbd1ff;
      font-size: clamp(17px, 3.5vw, 32px);
      line-height: 1.26;
      overflow: hidden;
    }
    .web-card small {
      margin-top: 28px;
      color: rgba(203,209,255,.78);
      font-size: clamp(11px, 1.7vw, 18px);
      word-break: break-all;
    }
    .pdf-layer {
      position: absolute;
      left: var(--pdf-x, 50%);
      top: var(--pdf-y, 54%);
      width: var(--pdf-w, 76%);
      height: var(--pdf-h, 72%);
      transform: translate(-50%, -50%);
      z-index: 7;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.28);
      background: #171a20;
      box-shadow: 0 18px 48px rgba(0,0,0,.42);
    }
    .pdf-layer iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #2a2d33;
    }
    .pdf-title {
      position: absolute;
      left: 10px;
      top: 8px;
      z-index: 2;
      max-width: calc(100% - 20px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,.58);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      pointer-events: none;
    }
    .pdf-viewer {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 46px 18px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: #2a2d33;
    }
    .pdf-toolbar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 36px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: rgba(0,0,0,.72);
      color: #fff;
    }
    .pdf-toolbar button {
      height: 26px;
      min-width: 30px;
      border: 1px solid rgba(255,255,255,.25);
      background: #20242b;
      color: #fff;
      border-radius: 6px;
      font-weight: 900;
      cursor: pointer;
    }
    .pdf-toolbar span {
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }
    .pdf-page {
      max-width: 100%;
      height: auto;
      background: #fff;
      box-shadow: 0 10px 28px rgba(0,0,0,.35);
    }
    .pdf-status {
      color: #fff;
      font-size: 13px;
      padding-top: 70px;
      text-align: center;
    }
    .debug {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 20;
      width: min(420px, calc(100% - 28px));
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(41,243,255,.55);
      background: rgba(0,0,0,.76);
      color: #eaffff;
      font: 700 13px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-line;
    }
    .test {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ff2bd6, #18e7ff 48%, #d9ff42);
      color: #07070c;
      font: 1000 clamp(44px, 9vw, 110px)/.95 Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 8vw;
      letter-spacing: 0;
    }
    .hidden { display: none !important; }
    @keyframes floaty {
      0%, 100% { transform: translate(-50%, -50%) rotate(var(--r)) scale(var(--s)); opacity: .86; }
      50% { transform: translate(calc(-50% + 6px), calc(-50% - 9px)) rotate(var(--r)) scale(calc(var(--s) * 1.025)); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="test" class="test hidden">TT LIVE STUDIO TEST OK</div>
  <div class="stage-wrap">
    <main id="stage" class="stage frame">
      <div id="bg" class="bg"></div>
      <div class="veil"></div>
      <div id="topic" class="topic">Overlay lädt...</div>
      <div id="clock" class="clock"><b>LIVE 00:00:00</b><span>Browserquelle startet</span></div>
      <div id="cloud" class="cloud">
        <span class="kw c0" style="--x:50%;--y:48%;--r:0deg;--s:1.15;--w:900;--d:9s;--delay:0s">TTLS</span>
        <span class="kw c1" style="--x:58%;--y:56%;--r:-4deg;--s:.9;--w:800;--d:10s;--delay:-1s">bereit</span>
      </div>
      <div id="countdown" class="countdown hidden"></div>
      <div id="videoLayer" class="video-layer hidden"></div>
      <div id="videoControls" class="video-controls hidden">
        <button type="button" id="videoBack">-10</button>
        <button type="button" id="videoPlay">Play/Pause</button>
        <button type="button" id="videoForward">+10</button>
      </div>
      <div id="webLayer" class="web-layer hidden"></div>
      <div id="pdfLayer" class="pdf-layer hidden"></div>
      <div id="debug" class="debug hidden"></div>
    </main>
  </div>
  <script>
    (function () {
      function getParam(name) {
        var query = window.location.search || "";
        if (query.charAt(0) === "?") query = query.slice(1);
        var parts = query.split("&");
        for (var i = 0; i < parts.length; i++) {
          var pair = parts[i].split("=");
          if (decodeURIComponent(pair[0] || "") === name) return decodeURIComponent((pair[1] || "").replace(/\+/g, " "));
        }
        return "";
      }
      var room = (getParam("room") || "default").replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 80) || "default";
      var debug = getParam("debug") === "1";
      var test = getParam("test") === "1";
      var transparent = getParam("transparent") === "1" || getParam("bg") === "transparent";
      var pollMs = Math.max(1000, Number(getParam("poll") || 2500));
      var lastState = null;
      var currentVideoKey = "";
      var currentWebsiteKey = "";
      var currentPdfKey = "";
      var pdfJsLoading = null;
      var pdfDoc = null;
      var pdfScale = 1;

      if (transparent) document.body.classList.add("transparent");
      if (test) {
        document.getElementById("test").classList.remove("hidden");
        if (debug) setDebug("Overlay geladen\nTestmodus aktiv\nRoom-ID: " + room + "\nletzter Refresh: " + new Date().toLocaleTimeString());
        return;
      }

      function escText(value) {
        return value == null ? "" : String(value);
      }
      function clamp(value, min, max) {
        value = Number(value);
        if (!isFinite(value)) return min;
        return Math.max(min, Math.min(max, value));
      }
      function setDebug(text) {
        var node = document.getElementById("debug");
        node.textContent = text;
        node.classList.remove("hidden");
      }
      function safeTime(ts) {
        if (!ts) return "--:--:--";
        try { return new Date(ts * 1000).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }
        catch (e) { return "--:--:--"; }
      }
      function positionFor(word, idx, total) {
        var hash = 0;
        var text = String(word || "") + idx;
        for (var i = 0; i < text.length; i++) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
        var angle = (idx / Math.max(1, total)) * Math.PI * 2 + (Math.abs(hash) % 35) / 20;
        var radius = 8 + (idx % 5) * 7;
        return {
          x: clamp(50 + Math.cos(angle) * radius + (Math.abs(hash) % 9) - 4, 8, 92),
          y: clamp(50 + Math.sin(angle * 1.15) * radius * .86 + ((Math.abs(hash) >> 4) % 9) - 4, 10, 90),
          r: idx % 8 === 0 ? 90 : [-6, -2, 0, 0, 4, 7][idx % 6]
        };
      }
      function readableUrl(value) {
        value = escText(value).trim();
        if (!value) return "";
        if (/^https?:\/\//i.test(value)) return value;
        return "https://" + value;
      }
      function youtubeEmbedUrl(value) {
        var url = readableUrl(value);
        if (!url) return "";
        try {
          var parsed = new URL(url);
          var host = parsed.hostname.replace(/^www\./, "");
          var id = "";
          if (host === "youtu.be") id = parsed.pathname.split("/").filter(Boolean)[0] || "";
          if (host === "youtube.com" || host === "m.youtube.com" || host === "youtube-nocookie.com") {
            if (parsed.pathname === "/watch") id = parsed.searchParams.get("v") || "";
            else if (parsed.pathname.indexOf("/shorts/") === 0 || parsed.pathname.indexOf("/embed/") === 0) id = parsed.pathname.split("/").filter(Boolean)[1] || "";
          }
          if (!id) return "";
          var muted = lastState && lastState.video_muted;
          var qs = "autoplay=" + (muted ? "1" : "0") + "&controls=1&playsinline=1&rel=0&mute=" + (muted ? "1" : "0") + "&enablejsapi=0";
          return "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(id) + "?" + qs;
        } catch (e) {
          return "";
        }
      }
      function hostOf(value) {
        try { return new URL(readableUrl(value)).hostname.replace(/^www\./, ""); }
        catch (e) { return readableUrl(value); }
      }
      function isKnownBlocked(value) {
        var host = hostOf(value).toLowerCase();
        return [
          "google.", "youtube.", "facebook.", "instagram.", "tiktok.", "x.com", "twitter.",
          "linkedin.", "amazon.", "netflix.", "spotify.", "paypal.", "bank", "zdfheute.de"
        ].some(function (part) { return host.indexOf(part) !== -1; });
      }
      function escapeHtml(value) {
        return escText(value).replace(/[&<>"']/g, function (char) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
        });
      }
      function fontStack(name) {
        var fonts = {
          "System Sans": "Inter, Arial, Helvetica, system-ui, sans-serif",
          "Inter": "Inter, Arial, Helvetica, system-ui, sans-serif",
          "Arial": "Arial, Helvetica, system-ui, sans-serif",
          "Helvetica": "Helvetica, Arial, system-ui, sans-serif",
          "Georgia": "Georgia, 'Times New Roman', serif",
          "Times New Roman": "'Times New Roman', Georgia, serif",
          "Playfair Display": "'Playfair Display', Georgia, serif",
          "Merriweather": "Merriweather, Georgia, serif",
          "Montserrat": "Montserrat, Inter, Arial, sans-serif",
          "Poppins": "Poppins, Inter, Arial, sans-serif",
          "Bebas Neue": "'Bebas Neue', Impact, sans-serif"
        };
        return fonts[name] || fonts.Inter;
      }
      function applyTheme(state) {
        var themes = {
          "Editorial Dark": ["#151413", "#f4efe5", "#c7bba8", "#d6b15e", "#8f7747", "rgba(25,24,22,.78)", "Playfair Display"],
          "Neon Pop": ["#050614", "#f4f7ff", "#b8c1ff", "#ff3df2", "#2dfcff", "rgba(9,10,26,.76)", "Poppins"],
          "Candy Gradient": ["#ff8cc6", "#26133a", "#6e3f75", "#ff6b35", "#00d1c7", "rgba(255,255,255,.30)", "Poppins"],
          "Bauhaus Clean": ["#f4efe2", "#111111", "#4e4b45", "#e53935", "#1d4ed8", "rgba(255,255,255,.80)", "Montserrat"],
          "Soft Power": ["#eaded5", "#2f2928", "#776a67", "#b04e6f", "#383130", "rgba(255,247,241,.76)", "Playfair Display"],
          "System Map": ["#101415", "#eaf1ed", "#9fb0a8", "#7bd7a8", "#7aa4ff", "rgba(17,23,24,.72)", "Inter"],
          "Newspaper / Print": ["#f1eadc", "#111111", "#57514a", "#c8292c", "#222222", "rgba(255,255,255,.72)", "Merriweather"],
          "Festival / Color Splash": ["#121019", "#fff8f0", "#ffdfe8", "#ff2f8f", "#35e6ff", "rgba(20,12,28,.58)", "Poppins"]
        };
        var theme = themes[state.layout] || themes["Neon Pop"];
        var root = document.documentElement;
        root.style.setProperty("--bg", theme[0]);
        root.style.setProperty("--text", theme[1]);
        root.style.setProperty("--muted", theme[2]);
        root.style.setProperty("--accent", theme[3]);
        root.style.setProperty("--accent2", theme[4]);
        root.style.setProperty("--panel", theme[5]);
        root.style.setProperty("--topic-font", fontStack(state.topic_font_family || theme[6]));
        root.style.setProperty("--keyword-font", fontStack(state.keyword_font_family || "Inter"));
        root.style.setProperty("--topic-weight", String(state.topic_font_weight || 900));
        root.style.setProperty("--keyword-weight", String(state.keyword_font_weight || 780));
        root.style.setProperty("--topic-transform", state.topic_text_transform === "uppercase" ? "uppercase" : "none");
      }
      function updateWebsite(state, hidden) {
        var layer = document.getElementById("webLayer");
        var showWebsite = !hidden && !!state.show_website && !!state.website_url;
        if (!showWebsite) {
          layer.classList.add("hidden");
          layer.innerHTML = "";
          currentWebsiteKey = "";
          return;
        }
        var url = readableUrl(state.website_url);
        var mode = state.website_mode || "Auto";
        var hasPreview = !!state.website_preview_text;
        var hasProxy = !!state.website_proxy_html;
        var blocked = isKnownBlocked(url);
        var useProxy = mode === "Website-Proxy" || (mode === "Auto" && hasProxy);
        var useIframe = mode === "Interaktiver Browser" || (mode === "Auto" && !hasPreview && !hasProxy && !blocked);
        var usePreview = mode === "Website-Vorschau" || (mode === "Auto" && hasPreview && !hasProxy);
        var key = (useProxy ? "proxy:" : useIframe ? "iframe:" : usePreview ? "preview:" : "card:") + url + "|" + (state.website_preview_title || "") + "|" + (state.website_preview_text || "") + "|" + (state.website_proxy_html ? state.website_proxy_html.length : 0);
        var webX = clamp(state.website_x || 50, 0, 100) + "%";
        var webY = clamp(state.website_y || 54, 0, 100) + "%";
        var webW = clamp(state.website_width || 76, 20, 100) + "%";
        var webH = clamp(state.website_height || 58, 15, 95) + "%";
        layer.style.setProperty("--web-x", webX);
        layer.style.setProperty("--web-y", webY);
        layer.style.setProperty("--web-w", webW);
        layer.style.setProperty("--web-h", webH);
        if (key !== currentWebsiteKey) {
          currentWebsiteKey = key;
          if (useProxy) {
            layer.innerHTML = '<iframe title="Website-Proxy" srcdoc="' + escapeHtml(state.website_proxy_html || "") + '" sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>';
          } else if (useIframe) {
            layer.innerHTML = '<iframe title="Website" src="' + url.replace(/"/g, "&quot;") + '" allow="clipboard-read; clipboard-write; fullscreen; autoplay" referrerpolicy="no-referrer-when-downgrade"></iframe>';
          } else {
            var title = state.website_preview_title || hostOf(url);
            var text = usePreview ? state.website_preview_text : "Diese Website blockiert sehr wahrscheinlich Einbettung in Browserquellen. Nutze Website-Vorschau, Link-Karte oder eine offizielle Embed-URL.";
            layer.innerHTML =
              '<div class="web-card">' +
              '<div class="eyebrow">' + (usePreview ? "Website-Vorschau" : "Website blockiert iframe") + " · " + escapeHtml(hostOf(url)) + '</div>' +
              '<b>' + escapeHtml(title) + '</b>' +
              '<p>' + escapeHtml(text || "") + '</p>' +
              '<small>' + escapeHtml(url) + '</small>' +
              '</div>';
          }
        }
        layer.classList.remove("hidden");
      }
      function updateVideo(state, hidden) {
        var layer = document.getElementById("videoLayer");
        var controls = document.getElementById("videoControls");
        var showVideo = !hidden && !!state.show_video && !!state.video_url;
        if (!showVideo) {
          layer.classList.add("hidden");
          controls.classList.add("hidden");
          currentVideoKey = "";
          layer.innerHTML = "";
          return false;
        }
        var url = readableUrl(state.video_url);
        var embed = youtubeEmbedUrl(url);
        var isYoutube = !!embed;
        var key = (isYoutube ? "yt:" + embed : "video:" + url);
        var videoX = clamp(state.video_x || 50, 0, 100) + "%";
        var videoY = clamp(state.video_y || 54, 0, 100) + "%";
        var videoW = clamp(state.video_width || 70, 5, 100) + "%";
        var videoH = clamp(state.video_height || 40, 5, 100) + "%";
        layer.style.setProperty("--video-x", videoX);
        layer.style.setProperty("--video-y", videoY);
        layer.style.setProperty("--video-w", videoW);
        layer.style.setProperty("--video-h", videoH);
        layer.style.setProperty("--video-o", clamp((state.video_opacity || 100) / 100, 0, 1));
        layer.style.setProperty("--video-fit", state.video_fit || "contain");
        controls.style.setProperty("--video-x", videoX);
        controls.style.setProperty("--video-y", videoY);
        controls.style.setProperty("--video-w", videoW);
        controls.style.setProperty("--video-h", videoH);

        if (key !== currentVideoKey) {
          currentVideoKey = key;
          if (isYoutube) {
            layer.innerHTML = '<iframe title="Live video" src="' + embed.replace(/"/g, "&quot;") + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
          } else {
            layer.innerHTML = '<video id="stageVideo" src="' + url.replace(/"/g, "&quot;") + '" controls playsinline ' + (state.video_muted ? "autoplay muted" : "") + '></video>';
            var video = document.getElementById("stageVideo");
            if (video && state.video_muted) {
              video.muted = !!state.video_muted;
              video.play().catch(function () {});
            }
          }
        } else if (!isYoutube) {
          var existing = document.getElementById("stageVideo");
          if (existing) existing.muted = !!state.video_muted;
        }
        layer.classList.remove("hidden");
        controls.classList.toggle("hidden", isYoutube);
        return true;
      }
      function updatePdf(state, hidden) {
        var layer = document.getElementById("pdfLayer");
        var showPdf = !hidden && !!state.show_pdf && !!state.pdf_data;
        if (!showPdf) {
          layer.classList.add("hidden");
          layer.innerHTML = "";
          currentPdfKey = "";
          return;
        }
        var pdfX = clamp(state.pdf_x || 50, 0, 100) + "%";
        var pdfY = clamp(state.pdf_y || 54, 0, 100) + "%";
        var pdfW = clamp(state.pdf_width || 76, 20, 100) + "%";
        var pdfH = clamp(state.pdf_height || 72, 20, 95) + "%";
        layer.style.setProperty("--pdf-x", pdfX);
        layer.style.setProperty("--pdf-y", pdfY);
        layer.style.setProperty("--pdf-w", pdfW);
        layer.style.setProperty("--pdf-h", pdfH);
        var zoom = clamp(state.pdf_zoom || 100, 50, 200);
        var key = state.pdf_data + "|" + (state.pdf_name || "") + "|" + zoom;
        if (key !== currentPdfKey) {
          currentPdfKey = key;
          pdfDoc = null;
          pdfScale = zoom / 100;
          layer.innerHTML =
            '<div class="pdf-toolbar"><button id="pdfOut" type="button">-</button><button id="pdfIn" type="button">+</button><span id="pdfZoom">' + zoom + '%</span><span>' + escapeHtml(state.pdf_name || "PDF") + '</span></div>' +
            '<div id="pdfViewer" class="pdf-viewer"><div class="pdf-status">PDF wird geladen...</div></div>';
          document.getElementById("pdfIn").onclick = function () { pdfScale = Math.min(2.5, pdfScale + .1); renderPdfPages(); };
          document.getElementById("pdfOut").onclick = function () { pdfScale = Math.max(.4, pdfScale - .1); renderPdfPages(); };
          loadPdfJs().then(function () { return loadPdfDocument(state.pdf_data); }).catch(function (error) {
            var viewer = document.getElementById("pdfViewer");
            if (viewer) viewer.innerHTML = '<div class="pdf-status">PDF konnte nicht gerendert werden: ' + escapeHtml(error.message || String(error)) + '</div>';
          });
        }
        layer.classList.remove("hidden");
      }
      function loadPdfJs() {
        if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
        if (pdfJsLoading) return pdfJsLoading;
        pdfJsLoading = new Promise(function (resolve, reject) {
          var script = document.createElement("script");
          script.src = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js";
          script.onload = function () {
            if (!window.pdfjsLib) {
              reject(new Error("PDF.js nicht verfügbar"));
              return;
            }
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
            resolve(window.pdfjsLib);
          };
          script.onerror = function () { reject(new Error("PDF.js konnte nicht geladen werden")); };
          document.head.appendChild(script);
        });
        return pdfJsLoading;
      }
      function bytesFromDataUrl(url) {
        var base64 = (url || "").split(",")[1] || "";
        var raw = atob(base64);
        var bytes = new Uint8Array(raw.length);
        for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
        return bytes;
      }
      function loadPdfDocument(dataUrl) {
        return window.pdfjsLib.getDocument({ data: bytesFromDataUrl(dataUrl) }).promise.then(function (doc) {
          pdfDoc = doc;
          return renderPdfPages();
        });
      }
      function renderPdfPages() {
        var viewer = document.getElementById("pdfViewer");
        var zoomLabel = document.getElementById("pdfZoom");
        if (!viewer || !pdfDoc) return;
        viewer.innerHTML = "";
        if (zoomLabel) zoomLabel.textContent = Math.round(pdfScale * 100) + "%";
        var pageNo = 1;
        function renderNext() {
          if (pageNo > pdfDoc.numPages) return Promise.resolve();
          return pdfDoc.getPage(pageNo).then(function (page) {
          var viewport = page.getViewport({ scale: pdfScale });
          var canvas = document.createElement("canvas");
          canvas.className = "pdf-page";
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          viewer.appendChild(canvas);
            return page.render({ canvasContext: canvas.getContext("2d"), viewport: viewport }).promise;
          }).then(function () {
            pageNo += 1;
            return renderNext();
          });
        }
        return renderNext();
      }
      document.getElementById("videoBack").addEventListener("click", function () {
        var video = document.getElementById("stageVideo");
        if (video) video.currentTime = Math.max(0, video.currentTime - 10);
      });
      document.getElementById("videoPlay").addEventListener("click", function () {
        var video = document.getElementById("stageVideo");
        if (video) video.paused ? video.play().catch(function () {}) : video.pause();
      });
      document.getElementById("videoForward").addEventListener("click", function () {
        var video = document.getElementById("stageVideo");
        if (video) video.currentTime = video.currentTime + 10;
      });
      function render(state) {
        lastState = state || {};
        var root = document.documentElement;
        var stage = document.getElementById("stage");
        var bg = document.getElementById("bg");
        var topic = document.getElementById("topic");
        var clock = document.getElementById("clock");
        var cloud = document.getElementById("cloud");
        var countdown = document.getElementById("countdown");
        var hidden = !!state.clear_overlay;
        var showCloud = !!state.show_cloud && !hidden && !state.minimal_mode;
        applyTheme(state);
        var videoVisible = updateVideo(state, hidden);
        updateWebsite(state, hidden);
        updatePdf(state, hidden);

        root.style.setProperty("--cloud-x", clamp(state.cloud_pos_x || 50, 0, 100) + "%");
        root.style.setProperty("--cloud-y", clamp(state.cloud_pos_y || 50, 0, 100) + "%");
        root.style.setProperty("--cloud-w", clamp(state.cloud_width || 58, 35, 95) + "%");
        root.style.setProperty("--cloud-h", clamp(state.cloud_height || 58, 35, 95) + "%");
        root.style.setProperty("--topic-x", clamp(state.topic_x || 36, 0, 100) + "%");
        root.style.setProperty("--topic-y", clamp(state.topic_y || 18, 0, 100) + "%");
        root.style.setProperty("--topic-w", clamp(state.topic_width || 68, 20, 95) + "%");
        root.style.setProperty("--topic-h", clamp(state.topic_height || 24, 8, 70) + "%");
        root.style.setProperty("--clock-x", clamp(state.clock_x || 82, 0, 100) + "%");
        root.style.setProperty("--clock-y", clamp(state.clock_y || 12, 0, 100) + "%");
        root.style.setProperty("--clock-w", clamp(state.clock_width || 24, 12, 60) + "%");
        root.style.setProperty("--clock-h", clamp(state.clock_height || 9, 6, 30) + "%");
        root.style.setProperty("--dim", clamp((state.bg_dim || 22) / 100, 0, .55));

        stage.className = "stage" + (state.show_overlay_frame !== false ? " frame" : "");
        if (state.active_image_data && state.show_background !== false && (!videoVisible || state.video_show_background !== false)) {
          bg.style.backgroundImage = "url(" + JSON.stringify(state.active_image_data) + ")";
          bg.style.backgroundSize = state.bg_fit || "cover";
          bg.style.backgroundPosition = (state.bg_pos_x || 50) + "% " + (state.bg_pos_y || 50) + "%";
          bg.style.opacity = clamp((state.bg_opacity || 100) / 100, 0, 1);
          bg.style.filter = "blur(" + clamp(state.bg_blur || 0, 0, 40) + "px) brightness(" + clamp(state.bg_brightness || 115, 80, 180) + "%)";
          bg.style.transform = "scale(" + clamp((state.bg_zoom || 100) / 100, .5, 2) + ")";
        } else {
          bg.style.backgroundImage = "";
        }

        topic.textContent = (!hidden && state.show_topic !== false) ? escText(state.topic || "") : "";
        topic.style.fontSize = "calc(clamp(38px, 7.8vw, 82px) * " + clamp((state.topic_text_size || 100) / 100, .4, 2.4) + ")";

        if (!hidden && state.show_clock !== false) {
          clock.innerHTML = "<b>LIVE " + escText(state.live_duration || "00:00:00") + "</b>" +
            (state.show_live_since === false ? "" : "<span>Live seit " + safeTime(state.live_started_at) + "</span>");
          clock.classList.remove("hidden");
        } else {
          clock.classList.add("hidden");
        }

        cloud.innerHTML = "";
        if (showCloud) {
          var keywords = Array.isArray(state.keywords) ? state.keywords.slice(0, 32) : [];
          var manual = Array.isArray(state.manual_cloud_words) ? state.manual_cloud_words.slice(0, 10) : [];
          var all = keywords.concat(manual.map(function (word, idx) { return { word: word, size: 1.55 - idx * .08, manual: true }; }));
          var baseSize = clamp((state.keyword_size || 60) / 100, .45, 2);
          all.forEach(function (item, idx) {
            var pos = positionFor(item.word, idx, all.length);
            var node = document.createElement("span");
            node.className = "kw c" + (idx % 6) + (item.manual ? " manual" : "");
            node.textContent = item.word;
            node.style.setProperty("--x", pos.x + "%");
            node.style.setProperty("--y", pos.y + "%");
            node.style.setProperty("--r", pos.r + "deg");
            node.style.setProperty("--s", Math.max(.72, (Number(item.size) || 1) * baseSize).toFixed(2));
            node.style.setProperty("--w", item.manual ? "950" : String(state.keyword_font_weight || 780));
            node.style.setProperty("--d", (9 + (idx % 5) * 1.4) + "s");
            node.style.setProperty("--delay", ((idx % 8) * -.7) + "s");
            cloud.appendChild(node);
          });
        }

        if (!hidden && state.show_countdown) {
          var remaining = Math.max(0, Number(state.countdown_remaining || 0));
          var minutes = Math.floor(remaining / 60);
          var seconds = Math.floor(remaining % 60);
          countdown.innerHTML = "<b>" + escText(state.countdown_title || "") + "</b><span>" +
            pad2(minutes) + ":" + pad2(seconds) + "</span>";
          countdown.classList.remove("hidden");
        } else {
          countdown.classList.add("hidden");
        }

        if (debug) {
          var count = (Array.isArray(state.keywords) ? state.keywords.length : 0) + (Array.isArray(state.manual_cloud_words) ? state.manual_cloud_words.length : 0);
          setDebug("Overlay geladen\nRoom-ID: " + room + "\nElemente: " + count + "\nSzenen: " + (state.scenes_count || 0) + "\nletzter Refresh: " + new Date().toLocaleTimeString() + "\nState: " + (state.updated_at ? safeTime(state.updated_at) : "fallback/leer"));
        }
      }
      function fallbackState() {
        return {
          topic: "Overlay bereit",
          show_topic: true,
          show_cloud: true,
          show_clock: true,
          show_overlay_frame: true,
          live_duration: "00:00:00",
          live_started_at: null,
          cloud_pos_x: 50,
          cloud_pos_y: 50,
          cloud_width: 58,
          cloud_height: 58,
          keyword_size: 60,
          keywords: [
            { word: "browserquelle", size: 1.15 },
            { word: "bereit", size: 1.05 },
            { word: "live", size: .95 }
          ],
          manual_cloud_words: [],
          scenes_count: 0
        };
      }
      function pad2(value) {
        value = String(Math.max(0, Number(value) || 0));
        return value.length < 2 ? "0" + value : value;
      }
      function getJson(url, done) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.setRequestHeader("Cache-Control", "no-store");
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) return;
          if (xhr.status >= 200 && xhr.status < 300 || xhr.status === 0 && xhr.responseText) {
            try { done(null, JSON.parse(xhr.responseText)); }
            catch (e) { done(e); }
          } else {
            done(new Error("state " + xhr.status));
          }
        };
        xhr.onerror = function () { done(new Error("XHR fehlgeschlagen")); };
        xhr.send(null);
      }
      function poll() {
        var url = "overlay_state_" + room + ".json?t=" + Date.now();
        getJson(url, function (err, state) {
          if (!err) {
            render(state);
            return;
          }
          if (room !== "default") {
            getJson("overlay_state_default.json?t=" + Date.now(), function (fallbackErr, fallbackStateFromFile) {
              if (!fallbackErr) {
                render(fallbackStateFromFile);
                if (debug) setDebug("Overlay geladen\nRoom-ID: " + room + "\nState-Datei fehlt, nutze default\nletzter Refresh: " + new Date().toLocaleTimeString());
                return;
              }
              if (lastState) {
                if (debug) setDebug("Overlay geladen\nRoom-ID: " + room + "\nletzter Refresh: " + new Date().toLocaleTimeString() + "\nPolling-Fehler: " + err.message);
                return;
              }
              render(fallbackState());
            });
            return;
          }
          if (lastState) {
            if (debug) setDebug("Overlay geladen\nRoom-ID: " + room + "\nletzter Refresh: " + new Date().toLocaleTimeString() + "\nPolling-Fehler: " + err.message);
            return;
          }
          render(fallbackState());
        });
      }
      poll();
      window.setInterval(poll, pollMs);
    })();
  </script>
</body>
</html>
