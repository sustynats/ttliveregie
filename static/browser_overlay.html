<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>TT Live Regie Overlay</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;background:#050608;color:#fff;font:600 16px/1.4 system-ui,sans-serif;}
  .center{position:fixed;inset:0;display:grid;place-items:center;text-align:center;padding:32px;}
  .center a{color:#29f3ff;}
</style>
<script>
(function(){
  // Forward query string (room, debug, test, transparent) to new stage.html.
  var qs = location.search || "";
  var target = "stage.html" + qs;
  try { location.replace(target); } catch (e) { location.href = target; }
})();
</script>
</head>
<body>
<div class="center">
  <div>
    <div>Bühne wird geladen…</div>
    <div style="margin-top:14px"><a id="lnk" href="stage.html">stage.html</a></div>
  </div>
</div>
<script>
  document.getElementById("lnk").href = "stage.html" + (location.search || "");
</script>
</body>
</html>
