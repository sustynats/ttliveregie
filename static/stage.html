<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>TT Live Regie Bühne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Playfair+Display:wght@400..900&family=Poppins:wght@300..900&family=Montserrat:wght@300..900&family=Merriweather:wght@300..900&family=Bebas+Neue&display=swap">
<style>
:root {
  --bg: #050608;
  --panel: rgba(8,10,16,.62);
  --text: #fff7ea;
  --muted: #d6c9b8;
  --accent: #ff4fd8;
  --accent2: #29f3ff;
  --accent3: #f8ff4d;
  --glow: rgba(255,79,216,.30);
  --dim: .22;
  --topicFont: Inter, system-ui, sans-serif;
  --keywordFont: Inter, system-ui, sans-serif;
  --highlightFont: Inter, system-ui, sans-serif;
  --countdownFont: Inter, system-ui, sans-serif;
  --cloudX: 50%;
  --cloudY: 50%;
  --cloudW: 58%;
  --cloudH: 58%;
  --cloudTilt: 0deg;
  --topicSize: 0.92;
  --keywordSize: 0.55;
  --highlightSize: 0.80;
  --countdownSize: 0.75;
  --clockSize: 0.55;
  --transitionMs: 360ms;
  --animScale: 1;
  --bgFit: cover;
  --bgPosX: 50%;
  --bgPosY: 50%;
  --bgZoom: 1;
  --bgBlur: 0px;
  --bgBrightness: 1;
  --bgOpacity: 1;
  --motionOpacity: .42;
  --motionSpeed: 1;
  --heatOpacity: 0;
  --overlayOpacity: 1;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #050608;
  color: var(--text);
  font-family: var(--topicFont);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body.transparent { background: transparent; }
body.transparent .stage { background: transparent; }
body.transparent .veil { background: transparent; display: none; }
.wrap {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background: transparent;
}
.stage {
  position: relative;
  height: 100vh;
  aspect-ratio: 9 / 16;
  width: auto;
  max-width: 100vw;
  overflow: hidden;
  background:
    radial-gradient(circle at 75% 18%, var(--glow), transparent 30%),
    radial-gradient(circle at 12% 78%, rgba(41,243,255,.18), transparent 36%),
    var(--bg);
  isolation: isolate;
  opacity: var(--overlayOpacity);
}
.stage[data-aspect="16:9"] { aspect-ratio: 16 / 9; height: auto; width: min(100vw, calc(100vh * 16 / 9)); }
.stage.frame { outline: 1px solid var(--glow); outline-offset: -2px; }

/* Background image */
.bg {
  position: absolute;
  inset: -3%;
  z-index: -4;
  background-size: var(--bgFit);
  background-repeat: no-repeat;
  background-position: var(--bgPosX) var(--bgPosY);
  filter: brightness(var(--bgBrightness)) blur(var(--bgBlur));
  opacity: var(--bgOpacity);
  transform: scale(var(--bgZoom));
  transition: opacity var(--transitionMs);
}
.veil {
  position: absolute; inset: 0; z-index: -3; pointer-events: none;
  background:
    linear-gradient(90deg, rgba(0,0,0,var(--dim)), rgba(0,0,0,.06) 60%, rgba(0,0,0,.02)),
    linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,var(--dim)));
}
.grain {
  position: absolute; inset: 0; z-index: -2; pointer-events: none;
  background-image:
    radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,.10) 1px, transparent 1px);
  background-size: 3px 3px, 4px 4px;
  background-position: 0 0, 1px 2px;
  opacity: .25;
  mix-blend-mode: overlay;
}

/* Layers */
.layer {
  position: absolute;
  transform: translate(-50%, -50%);
  transition: transform var(--transitionMs), left var(--transitionMs), top var(--transitionMs), width var(--transitionMs), height var(--transitionMs);
}
.layer[data-hidden="1"] { display: none; }

.l-topic {
  z-index: 4;
  font-family: var(--topicFont);
  font-weight: var(--topicWeight, 850);
  font-size: calc(clamp(34px, 7vw, 78px) * var(--topicSize));
  letter-spacing: var(--topicSpacing, 0);
  text-transform: var(--topicTransform, none);
  text-shadow: 0 12px 32px rgba(0,0,0,.55);
  line-height: 1;
  padding: 4px 0;
}
.l-topic::after {
  content: "";
  display: block;
  width: 78px;
  height: 4px;
  margin-top: 14px;
  border-radius: 99px;
  background: var(--accent);
  box-shadow: 0 0 24px var(--glow);
}

.l-highlight {
  z-index: 5;
  font-family: var(--highlightFont);
  font-weight: var(--highlightWeight, 880);
  font-size: calc(clamp(28px, 5.6vw, 64px) * var(--highlightSize));
  letter-spacing: var(--highlightSpacing, 0);
  border-left: 4px solid var(--accent);
  padding: 10px 18px;
  background: var(--panel);
  border-radius: 14px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 32px var(--glow);
  white-space: nowrap;
}

.l-cloud {
  z-index: 3;
  width: var(--cloudW);
  height: var(--cloudH);
  transform: translate(-50%, -50%) rotate(var(--cloudTilt));
  pointer-events: none;
}
.l-cloud .kw {
  position: absolute;
  font-family: var(--keywordFont);
  font-weight: var(--keywordWeight, 760);
  font-size: calc(clamp(14px, 2.6vw, 36px) * var(--keywordSize) * var(--kwSizeFactor, 1));
  white-space: nowrap;
  transform: translate(-50%, -50%) rotate(var(--kwRot, 0deg));
  text-shadow: 0 4px 16px rgba(0,0,0,.40);
  animation: floaty calc(8s / var(--animScale)) ease-in-out infinite;
  animation-delay: var(--kwDelay, 0s);
  color: var(--text);
}
.l-cloud .kw[data-fresh="1"] { color: var(--accent); }
.l-cloud .kw.manual {
  background: linear-gradient(120deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.l-clock {
  z-index: 6;
  font-family: var(--countdownFont);
  font-weight: 900;
  font-size: calc(clamp(13px, 1.6vw, 19px) * var(--clockSize));
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--panel);
  border: 1px solid rgba(255,255,255,.18);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  gap: 2px;
  line-height: 1.05;
}
.l-clock .lbl { color: var(--muted); font-size: .76em; }

.l-countdown {
  z-index: 6;
  font-family: var(--countdownFont);
  font-weight: 900;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 18px;
  border-radius: 22px;
  background: var(--panel);
  border: 1px solid rgba(255,255,255,.18);
  backdrop-filter: blur(12px);
  font-size: calc(clamp(20px, 3.6vw, 40px) * var(--countdownSize));
}
.l-countdown .ring {
  width: 2.6em;
  height: 2.6em;
  flex: 0 0 auto;
  border-radius: 999px;
  background: conic-gradient(var(--accent) calc(var(--pct, 100) * 1%), rgba(255,255,255,.18) 0);
  display: grid;
  place-items: center;
  position: relative;
}
.l-countdown .ring::after {
  content: "";
  position: absolute;
  inset: 6px;
  background: var(--bg);
  border-radius: 999px;
}
.l-countdown .ring span {
  position: relative;
  font-size: .55em;
}
.l-countdown .meta { display: flex; flex-direction: column; gap: 2px; line-height: 1.05; }
.l-countdown .ttl { color: var(--muted); font-size: .55em; text-transform: uppercase; letter-spacing: .14em; }

.l-video {
  z-index: 5;
  border-radius: 14px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 22px 50px rgba(0,0,0,.5);
}
.l-video iframe, .l-video video { width: 100%; height: 100%; display: block; border: 0; }

.l-website {
  z-index: 4;
  border-radius: 14px;
  overflow: hidden;
  background: var(--panel);
  box-shadow: 0 22px 50px rgba(0,0,0,.5);
}
.l-website iframe { width: 100%; height: 100%; display: block; border: 0; background: #fff; }
.l-website .preview {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #fff;
  color: #111;
}
.l-website .preview img { width: 100%; height: 60%; object-fit: cover; background: #ddd; }
.l-website .preview .body {
  padding: 18px 22px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1 1 auto;
  overflow: hidden;
  font-family: var(--topicFont);
}
.l-website .preview .ttl { font-size: 22px; font-weight: 800; line-height: 1.15; color: #111; }
.l-website .preview .desc { font-size: 14px; color: #555; line-height: 1.42; overflow: hidden; }
.l-website .preview .url { font-size: 12px; color: #888; margin-top: auto; word-break: break-all; }
.l-website .shot {
  width: 100%; height: 100%;
  background-size: cover;
  background-position: center top;
  background-color: #1a1a1a;
}

.l-pdf {
  z-index: 6;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 22px 50px rgba(0,0,0,.5);
}
.l-pdf iframe { width: 100%; height: 100%; border: 0; display: block; background: #fff; }

.l-ai {
  z-index: 6;
  padding: 18px 22px;
  background: var(--panel);
  border: 1px solid rgba(255,255,255,.20);
  border-radius: 18px;
  backdrop-filter: blur(14px);
  display: flex;
  flex-direction: column;
  gap: 8px;
  color: var(--text);
  font-family: var(--topicFont);
  box-shadow: 0 18px 44px rgba(0,0,0,.4);
}
.l-ai .ttl { font-size: 12px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); }
.l-ai .body { font-size: 16px; line-height: 1.45; white-space: pre-wrap; overflow: hidden; }

/* Motion layers */
.motion {
  position: absolute; inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: var(--motionOpacity);
  mix-blend-mode: screen;
}
.motion[data-hidden="1"] { display: none; }
.motion.aerosol::before, .motion.aerosol::after {
  content: ""; position: absolute; inset: -10%;
  background: radial-gradient(circle at 30% 40%, rgba(255,255,255,.18), transparent 38%),
              radial-gradient(circle at 72% 70%, rgba(255,255,255,.10), transparent 40%);
  filter: blur(18px);
  animation: aerosol calc(28s / var(--motionSpeed)) ease-in-out infinite;
}
.motion.aerosol::after { animation-direction: reverse; opacity: .8; }
.motion.fire {
  background: radial-gradient(circle at 50% 110%, rgba(255,140,40,.45), rgba(255,40,0,.30) 16%, transparent 38%);
  animation: flicker calc(2.4s / var(--motionSpeed)) steps(8, end) infinite;
}
.motion.dust::before {
  content: ""; position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,236,180,.7) 1px, transparent 2px);
  background-size: 18px 18px;
  animation: dustdrift calc(40s / var(--motionSpeed)) linear infinite;
}
.motion.scan {
  background: repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0 2px, transparent 2px 4px);
  animation: scan calc(8s / var(--motionSpeed)) linear infinite;
}
.motion.rain::before {
  content: ""; position: absolute; inset: 0;
  background: repeating-linear-gradient(110deg, rgba(180,210,255,.12) 0 1px, transparent 1px 6px);
  animation: rain calc(0.7s / var(--motionSpeed)) linear infinite;
}
.motion.spark::before {
  content: ""; position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,240,140,.85) 1px, transparent 2px);
  background-size: 30px 30px;
  animation: pulse calc(2.2s / var(--motionSpeed)) ease-in-out infinite;
}
.motion.wave {
  background: repeating-radial-gradient(circle at 50% 110%, rgba(120,200,255,.15) 0 2px, transparent 2px 24px);
  animation: pulse calc(6s / var(--motionSpeed)) ease-in-out infinite;
}

.heat {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: var(--heatOpacity);
  mix-blend-mode: screen;
  background: radial-gradient(circle at 50% 50%, var(--heatColor, rgba(255,90,90,.4)), transparent 60%);
  animation: pulse calc(4s / var(--motionSpeed)) ease-in-out infinite;
}

/* Edit-Mode handles */
.edit-handle {
  position: absolute;
  cursor: move;
  border: 2px dashed transparent;
  border-radius: 8px;
  transition: border-color 120ms;
  z-index: 50;
  pointer-events: auto;
  transform: translate(-50%, -50%);
}
body.edit-mode .edit-handle { border-color: rgba(41,243,255,.55); background: rgba(41,243,255,.05); }
body.edit-mode .edit-handle:hover { border-color: var(--accent2); background: rgba(41,243,255,.12); }
body.edit-mode .edit-handle .label {
  position: absolute;
  top: -22px;
  left: 0;
  font: 600 11px/1 system-ui, sans-serif;
  color: var(--accent2);
  background: rgba(0,0,0,.65);
  padding: 3px 8px;
  border-radius: 99px;
  pointer-events: none;
  white-space: nowrap;
}
body.edit-mode .edit-handle .resize {
  position: absolute;
  width: 14px;
  height: 14px;
  background: var(--accent2);
  border: 2px solid #000;
  border-radius: 50%;
  right: -8px;
  bottom: -8px;
  cursor: nwse-resize;
}
body.edit-mode .edit-handle .hide-btn {
  position: absolute;
  top: -22px;
  right: -8px;
  width: 22px;
  height: 22px;
  background: rgba(255,80,120,.85);
  color: #fff;
  border: 0;
  border-radius: 50%;
  font: 700 14px/1 system-ui, sans-serif;
  cursor: pointer;
}
body.edit-mode .edit-grid {
  position: absolute;
  inset: 0;
  z-index: 49;
  pointer-events: none;
  background-image:
    linear-gradient(0deg, rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
  background-size: 10% 10%;
}

/* Status badge for debug/test mode */
.status-badge {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 9999;
  font: 600 12px/1.3 system-ui, sans-serif;
  background: rgba(0,0,0,.7);
  color: #29f3ff;
  padding: 6px 10px;
  border-radius: 6px;
  pointer-events: none;
  max-width: 80vw;
}
.status-badge.test { background: #29f3ff; color: #050608; font-weight: 900; font-size: 28px; padding: 22px 32px; }

/* Animations */
@keyframes floaty {
  0%, 100% { transform: translate(-50%, -50%) translateY(0) rotate(var(--kwRot, 0deg)); }
  50% { transform: translate(-50%, -50%) translateY(-6px) rotate(var(--kwRot, 0deg)); }
}
@keyframes aerosol {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-3%, 4%) scale(1.06); }
}
@keyframes flicker {
  0%, 100% { opacity: .35; }
  20% { opacity: .9; }
  45% { opacity: .55; }
  70% { opacity: .85; }
}
@keyframes dustdrift {
  0% { background-position: 0 0; }
  100% { background-position: 200px 200px; }
}
@keyframes scan {
  0% { background-position: 0 0; }
  100% { background-position: 0 200px; }
}
@keyframes rain {
  0% { background-position: 0 0; }
  100% { background-position: 0 60px; }
}
@keyframes pulse {
  0%, 100% { opacity: .35; }
  50% { opacity: 1; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage" id="stage" data-aspect="9:16">
    <div class="bg" id="bg"></div>
    <div class="veil"></div>
    <div class="grain"></div>
    <div class="motion aerosol" data-effect="Aerosol-Wolken" data-hidden="1"></div>
    <div class="motion fire" data-effect="Lagerfeuer" data-hidden="1"></div>
    <div class="motion dust" data-effect="Lichtstaub" data-hidden="1"></div>
    <div class="motion scan" data-effect="Scanlines" data-hidden="1"></div>
    <div class="motion rain" data-effect="Regen" data-hidden="1"></div>
    <div class="motion spark" data-effect="Funkeln" data-hidden="1"></div>
    <div class="motion wave" data-effect="Wellen" data-hidden="1"></div>
    <div class="heat" id="heat" data-hidden="1"></div>
    <div id="layers"></div>
    <div class="edit-grid" id="editGrid" style="display:none"></div>
    <div id="editHandles"></div>
  </div>
</div>
<div class="status-badge" id="statusBadge" style="display:none"></div>

<script>
(function () {
  "use strict";

  // ---- URL params --------------------------------------------------------
  const params = new URLSearchParams(location.search);
  const room = params.get("room") || "default";
  const editMode = params.get("edit") === "1";
  const debugMode = params.get("debug") === "1";
  const testMode = params.get("test") === "1";
  const transparent = params.get("transparent") === "1" || params.get("bg") === "transparent";

  if (transparent) document.body.classList.add("transparent");
  if (editMode) document.body.classList.add("edit-mode");

  if (testMode) {
    const b = document.getElementById("statusBadge");
    b.textContent = "TT LIVE STUDIO TEST OK";
    b.classList.add("test");
    b.style.display = "block";
    return;
  }

  const stage = document.getElementById("stage");
  const bgEl = document.getElementById("bg");
  const layers = document.getElementById("layers");
  const editHandles = document.getElementById("editHandles");
  const editGrid = document.getElementById("editGrid");
  const heatEl = document.getElementById("heat");
  const statusBadge = document.getElementById("statusBadge");

  if (editMode) editGrid.style.display = "block";

  const FONT_STACKS = {
    "System Sans": "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
    "Inter": "Inter, ui-sans-serif, system-ui, sans-serif",
    "Arial": "Arial, Helvetica, sans-serif",
    "Helvetica": "Helvetica, Arial, sans-serif",
    "Georgia": "Georgia, serif",
    "Times New Roman": "'Times New Roman', Times, serif",
    "Playfair Display": "'Playfair Display', Georgia, serif",
    "Merriweather": "Merriweather, Georgia, serif",
    "Montserrat": "Montserrat, Arial, sans-serif",
    "Poppins": "Poppins, Arial, sans-serif",
    "Bebas Neue": "'Bebas Neue', Impact, sans-serif"
  };

  function fontStack(name) { return FONT_STACKS[name] || FONT_STACKS["System Sans"]; }

  function fmt(n, d) { return Number.isFinite(n) ? n : (d || 0); }
  function pct(n) { return fmt(n, 50) + "%"; }

  // ---- Cloud-Style positions (port from app.py) -------------------------
  function md5sum(s) {
    // Tiny 32-bit hash sufficient for deterministic seed (not crypto). Same idea as digest[:8].
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
    return Math.abs(h);
  }
  function basePos(word, idx) {
    const seed = md5sum(word);
    const cols = [10, 24, 40, 57, 71];
    const rows = [26, 36, 47, 58, 68];
    let x = cols[(idx + seed) % cols.length] + (seed % 7) - 3;
    let y = rows[(idx * 2 + seed) % rows.length] + ((Math.floor(seed / 7)) % 7) - 3;
    return [Math.max(7, Math.min(78, x)), Math.max(18, Math.min(74, y))];
  }
  function stylePos(style, word, idx, total) {
    const seed = md5sum(style + "-" + word);
    total = Math.max(1, total);
    const angle = (idx / total) * (Math.PI * 2) + (seed % 40) / 40;
    let x, y, rot = 0;
    if (style === "Vertical Cloud") {
      x = 45 + ((idx % 3) - 1) * 16 + (seed % 9) - 4;
      y = 10 + (idx / Math.max(1, total - 1)) * 78;
      rot = idx % 5 === 0 ? 90 : 0;
    } else if (style === "Orbital Cloud") {
      const r = 16 + (idx % 4) * 9;
      x = 50 + Math.cos(angle) * r;
      y = 50 + Math.sin(angle) * r * 0.78;
    } else if (style === "Network Cloud") {
      const r = 12 + (idx % 5) * 8;
      x = 50 + Math.cos(angle) * r;
      y = 50 + Math.sin(angle * 1.17) * r;
    } else if (style === "Magazine Cloud") {
      [x, y] = basePos(word, idx);
      rot = [-4, 0, 0, 3, -2][idx % 5];
    } else if (style === "Minimal Cloud") {
      x = 28 + (idx % 2) * 34 + (seed % 5);
      y = 30 + Math.floor(idx / 2) * 13;
    } else if (style === "Color Burst") {
      [x, y] = basePos(word, idx);
      rot = [0, 0, 90, -7, 5][idx % 5];
    } else if (style === "Bubble Cloud") {
      [x, y] = basePos(word, idx);
    } else {
      [x, y] = basePos(word, idx);
      rot = idx % 9 === 0 ? 90 : 0;
    }
    return [Math.max(7, Math.min(93, x)), Math.max(8, Math.min(92, y)), rot];
  }

  // ---- Smart embed (iframe → screenshot → og-card) ----------------------
  function screenshotUrl(url) {
    // image.thum.io: free, no key, ~30 s cache. width=1080 → fits 9:16 stage.
    const clean = url.replace(/^https?:\/\//, "");
    return "https://image.thum.io/get/width/1080/crop/1920/" + encodeURIComponent("https://" + clean) + "?_=" + Math.floor(Date.now() / 30000);
  }

  function buildWebsite(layer, st) {
    const url = st.website_url || "";
    const mode = st.website_mode || "Auto";
    if (!url) { layer.innerHTML = ""; return; }
    if (layer.dataset.url === url && layer.dataset.mode === mode) return; // unchanged
    layer.dataset.url = url;
    layer.dataset.mode = mode;
    layer.innerHTML = "";

    const tryIframe = () => {
      const iframe = document.createElement("iframe");
      iframe.src = url;
      iframe.referrerPolicy = "no-referrer";
      iframe.sandbox = "allow-same-origin allow-scripts allow-popups allow-forms";
      let loaded = false;
      iframe.addEventListener("load", () => { loaded = true; });
      layer.appendChild(iframe);
      // Fallback to screenshot after 3500ms if not loaded or blocked
      setTimeout(() => {
        if (!loaded) {
          // iframe.contentDocument check throws on cross-origin; we cannot reliably tell.
          // Stick with iframe — most modern sites still render even if we can't read them.
        }
      }, 3500);
    };

    const buildShot = () => {
      const shot = document.createElement("div");
      shot.className = "shot";
      shot.style.backgroundImage = "url('" + screenshotUrl(url) + "')";
      layer.appendChild(shot);
    };

    const buildPreview = () => {
      const prev = document.createElement("div");
      prev.className = "preview";
      const og = st.website_og || {};
      const img = document.createElement("img");
      img.src = og.image || screenshotUrl(url);
      img.onerror = () => { img.style.display = "none"; };
      const body = document.createElement("div");
      body.className = "body";
      body.innerHTML =
        '<div class="ttl">' + escapeHtml(og.title || st.website_preview_title || url) + "</div>" +
        '<div class="desc">' + escapeHtml((og.description || st.website_preview_text || "").slice(0, 280)) + "</div>" +
        '<div class="url">' + escapeHtml(url) + "</div>";
      prev.appendChild(img);
      prev.appendChild(body);
      layer.appendChild(prev);
    };

    if (mode === "Website-Vorschau" || mode === "Link-Karte") {
      buildPreview();
    } else if (mode === "Screenshot") {
      buildShot();
    } else if (mode === "Interaktiver Browser" || mode === "Website-Proxy") {
      tryIframe();
    } else {
      // Auto: try iframe, but fall back to screenshot for known blockers
      const blockedHosts = ["zdf.de","www.zdf.de","ardmediathek.de","www.ardmediathek.de","tagesschau.de","www.tagesschau.de","spiegel.de","www.spiegel.de","zeit.de","www.zeit.de","sueddeutsche.de","www.sueddeutsche.de","instagram.com","www.instagram.com","facebook.com","www.facebook.com","x.com","twitter.com","www.twitter.com"];
      try {
        const u = new URL(url);
        if (blockedHosts.includes(u.hostname.toLowerCase())) {
          buildShot();
          return;
        }
      } catch (e) {}
      tryIframe();
    }
  }

  // ---- Helpers ----------------------------------------------------------
  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function youtubeId(url) {
    if (!url) return "";
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
    return m ? m[1] : "";
  }

  // ---- Layer renderers --------------------------------------------------
  function ensureLayer(id, cls) {
    let el = layers.querySelector('[data-id="' + id + '"]');
    if (!el) {
      el = document.createElement("div");
      el.className = "layer " + cls;
      el.dataset.id = id;
      layers.appendChild(el);
    } else {
      // Keep class name in sync if it ever changes
      if (!el.classList.contains(cls)) {
        el.className = "layer " + cls;
      }
    }
    return el;
  }
  function removeLayer(id) {
    const el = layers.querySelector('[data-id="' + id + '"]');
    if (el) el.remove();
  }
  function placeLayer(el, x, y, w, h) {
    el.style.left = pct(x);
    el.style.top = pct(y);
    if (w !== undefined) el.style.width = pct(w);
    if (h !== undefined) el.style.height = pct(h);
  }

  // ---- Render whole state -----------------------------------------------
  let lastStateKey = "";
  let lastWebsiteUrl = "";

  function render(state) {
    if (!state) return;
    window.__ttlLast = state;

    // Theme variables
    const r = document.documentElement;
    r.style.setProperty("--bg", state.bg || "#050608");
    r.style.setProperty("--panel", state.panel || "rgba(8,10,16,.62)");
    r.style.setProperty("--text", state.text_color || state.text || "#fff7ea");
    r.style.setProperty("--muted", state.muted || "#d6c9b8");
    r.style.setProperty("--accent", state.accent || "#ff4fd8");
    r.style.setProperty("--accent2", state.accent2 || "#29f3ff");
    r.style.setProperty("--accent3", state.accent3 || "#f8ff4d");
    r.style.setProperty("--glow", state.glow || "rgba(255,79,216,.30)");
    r.style.setProperty("--topicFont", fontStack(state.topic_font_family || "Inter"));
    r.style.setProperty("--keywordFont", fontStack(state.keyword_font_family || "Inter"));
    r.style.setProperty("--highlightFont", fontStack(state.highlight_font_family || state.topic_font_family || "Inter"));
    r.style.setProperty("--countdownFont", fontStack(state.countdown_font_family || "Inter"));
    r.style.setProperty("--topicSize", (state.topic_text_size || 90) / 100);
    r.style.setProperty("--keywordSize", (state.keyword_size || 55) / 100);
    r.style.setProperty("--highlightSize", (state.highlight_text_size || 80) / 100);
    r.style.setProperty("--countdownSize", (state.countdown_text_size || 75) / 100);
    r.style.setProperty("--clockSize", (state.clock_text_size || 55) / 100);
    r.style.setProperty("--topicWeight", state.topic_font_weight || 850);
    r.style.setProperty("--keywordWeight", state.keyword_font_weight || 760);
    r.style.setProperty("--highlightWeight", state.highlight_font_weight || 880);
    r.style.setProperty("--topicSpacing", ((state.topic_letter_spacing || 0) / 100) + "em");
    r.style.setProperty("--highlightSpacing", ((state.highlight_letter_spacing || 0) / 100) + "em");
    r.style.setProperty("--topicTransform", state.topic_text_transform === "uppercase" ? "uppercase" : "none");
    r.style.setProperty("--cloudTilt", (state.cloud_tilt || 0) + "deg");
    r.style.setProperty("--cloudW", (state.cloud_width || 58) + "%");
    r.style.setProperty("--cloudH", (state.cloud_height || 58) + "%");
    r.style.setProperty("--animScale", Math.max(0.2, (state.animation_intensity || 55) / 55));
    r.style.setProperty("--motionOpacity", (state.motion_opacity || 42) / 100);
    r.style.setProperty("--motionSpeed", Math.max(0.2, (state.motion_speed || 55) / 55));
    r.style.setProperty("--overlayOpacity", (state.overlay_opacity || 100) / 100);
    r.style.setProperty("--transitionMs", Math.max(80, (1000 - (state.transition_speed || 60) * 8)) + "ms");
    r.style.setProperty("--dim", (state.bg_dim || 22) / 100);

    // Aspect
    stage.dataset.aspect = state.aspect === "16:9" ? "16:9" : "9:16";
    if (state.show_overlay_frame) stage.classList.add("frame"); else stage.classList.remove("frame");

    // Background image
    if (state.show_background && state.active_image_data) {
      bgEl.style.backgroundImage = "url('" + state.active_image_data + "')";
      bgEl.style.display = "block";
    } else {
      bgEl.style.backgroundImage = "";
      bgEl.style.display = state.show_background ? "block" : "none";
    }
    r.style.setProperty("--bgFit", state.bg_fit === "contain" ? "contain" : "cover");
    r.style.setProperty("--bgPosX", (state.bg_pos_x || 50) + "%");
    r.style.setProperty("--bgPosY", (state.bg_pos_y || 50) + "%");
    r.style.setProperty("--bgZoom", (state.bg_zoom || 100) / 100);
    r.style.setProperty("--bgBlur", (state.bg_blur || 0) + "px");
    r.style.setProperty("--bgBrightness", (state.bg_brightness || 115) / 100);
    r.style.setProperty("--bgOpacity", (state.bg_opacity || 100) / 100);

    const clearAll = !!state.clear_overlay;

    // Topic
    if (state.show_topic && !clearAll && (state.topic || "").trim()) {
      const el = ensureLayer("topic", "l-topic");
      el.dataset.hidden = "0";
      placeLayer(el, state.topic_x || 36, state.topic_y || 18, state.topic_width || 68, state.topic_height || 24);
      if (el.textContent !== state.topic) el.textContent = state.topic;
    } else {
      removeLayer("topic");
    }

    // Highlight
    if (state.show_highlight && !clearAll && (state.highlight_word || "").trim()) {
      const el = ensureLayer("highlight", "l-highlight");
      el.dataset.hidden = "0";
      placeLayer(el, state.highlight_x || 70, state.highlight_y || 80, state.highlight_width || 40, state.highlight_height || 18);
      if (el.textContent !== state.highlight_word) el.textContent = state.highlight_word;
    } else {
      removeLayer("highlight");
    }

    // Cloud
    if (state.show_cloud && !clearAll) {
      const el = ensureLayer("cloud", "l-cloud");
      el.dataset.hidden = "0";
      placeLayer(el, state.cloud_pos_x || 50, state.cloud_pos_y || 50);
      // Build keyword spans (cheap rebuild — count is small, ~32)
      const kws = state.keywords || [];
      const manuals = state.manual_cloud_words || [];
      const total = Math.max(1, kws.length + manuals.length);
      const density = Math.max(0, Math.min(kws.length, Math.floor(32 * (state.keyword_density || 45) / 100)));
      const cs = state.cloud_style || "Magazine Cloud";
      let html = "";
      for (let i = 0; i < density; i++) {
        const k = kws[i];
        if (!k) break;
        const [x, y, rot] = stylePos(cs, k.word, i, total);
        const sf = (k.size || 1).toFixed(2);
        html += '<span class="kw" data-fresh="' + (k.fresh ? 1 : 0) + '" style="left:' + x + '%;top:' + y + '%;--kwSizeFactor:' + sf + ';--kwRot:' + rot + 'deg;--kwDelay:' + (i * 0.18).toFixed(2) + 's">' + escapeHtml(k.word) + '</span>';
      }
      manuals.forEach((m, idx) => {
        const [x, y, rot] = stylePos(cs, m, idx + 100, total);
        html += '<span class="kw manual" style="left:' + x + '%;top:' + y + '%;--kwSizeFactor:1.2;--kwRot:' + rot + 'deg;--kwDelay:' + (idx * 0.20).toFixed(2) + 's">' + escapeHtml(m) + '</span>';
      });
      // Only replace innerHTML if changed (avoids needless animation reset)
      if (el.dataset.kwSig !== html.length + ":" + (kws[0] ? kws[0].word : "")) {
        el.innerHTML = html;
        el.dataset.kwSig = html.length + ":" + (kws[0] ? kws[0].word : "");
      }
    } else {
      removeLayer("cloud");
    }

    // Clock / Live
    if (state.show_clock && !clearAll) {
      const el = ensureLayer("clock", "l-clock");
      el.dataset.hidden = "0";
      placeLayer(el, state.clock_x || 88, state.clock_y || 8, state.clock_width || 22, state.clock_height || 10);
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      let inner = "<span>" + hh + ":" + mm + ":" + ss + "</span>";
      if (state.show_live_since && state.live_started_at) {
        inner += '<span class="lbl">Live ' + (state.live_duration || "00:00:00") + "</span>";
      }
      if (el.innerHTML !== inner) el.innerHTML = inner;
    } else {
      removeLayer("clock");
    }

    // Countdown
    if (state.show_countdown && !clearAll) {
      const el = ensureLayer("countdown", "l-countdown");
      el.dataset.hidden = "0";
      placeLayer(el, state.countdown_x || 50, state.countdown_y || 88, state.countdown_width || 50, state.countdown_height || 14);
      const total = Math.max(1, state.countdown_total || (state.countdown_minutes || 5) * 60);
      const remaining = Math.max(0, state.countdown_remaining != null ? state.countdown_remaining : total);
      const pctRing = Math.max(0, Math.min(100, (remaining / total) * 100));
      const m = Math.floor(remaining / 60);
      const s = Math.floor(remaining % 60);
      const time = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
      el.style.setProperty("--pct", pctRing);
      const inner =
        '<div class="ring"><span>' + time + '</span></div>' +
        '<div class="meta"><div class="ttl">' + escapeHtml(state.countdown_title || "Countdown") + '</div><div>' + time + '</div></div>';
      if (el.dataset.cdSig !== time + state.countdown_title) {
        el.innerHTML = inner;
        el.dataset.cdSig = time + state.countdown_title;
      }
    } else {
      removeLayer("countdown");
    }

    // Video
    if (state.show_video && !clearAll && (state.video_url || "").trim()) {
      const el = ensureLayer("video", "l-video");
      el.dataset.hidden = "0";
      placeLayer(el, state.video_x || 50, state.video_y || 50, state.video_width || 60, state.video_height || 60);
      el.style.opacity = (state.video_opacity || 100) / 100;
      const url = state.video_url;
      if (el.dataset.url !== url) {
        el.dataset.url = url;
        const yt = youtubeId(url);
        if (yt) {
          const muted = state.video_muted ? "1" : "0";
          el.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + yt + '?autoplay=1&mute=' + muted + '&rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
        } else {
          el.innerHTML = '<video src="' + escapeHtml(url) + '" autoplay ' + (state.video_muted ? "muted" : "") + ' loop playsinline controls></video>';
        }
      }
    } else {
      removeLayer("video");
    }

    // Website
    if (state.show_website && !clearAll && (state.website_url || "").trim()) {
      const el = ensureLayer("website", "l-website");
      el.dataset.hidden = "0";
      placeLayer(el, state.website_x || 50, state.website_y || 50, state.website_width || 70, state.website_height || 60);
      buildWebsite(el, state);
    } else {
      removeLayer("website");
    }

    // PDF
    if (state.show_pdf && !clearAll && state.pdf_data) {
      const el = ensureLayer("pdf", "l-pdf");
      el.dataset.hidden = "0";
      placeLayer(el, state.pdf_x || 50, state.pdf_y || 50, state.pdf_width || 70, state.pdf_height || 80);
      if (el.dataset.pdfName !== state.pdf_name) {
        el.dataset.pdfName = state.pdf_name || "doc.pdf";
        el.innerHTML = '<iframe src="' + state.pdf_data + '#zoom=' + (state.pdf_zoom || 100) + '" title="PDF"></iframe>';
      }
    } else {
      removeLayer("pdf");
    }

    // AI Card
    const aiText = (state.ai_response || "").trim();
    const aiBad = /KI-Anfrage fehlgeschlagen|RESOURCE_EXHAUSTED|NOT_FOUND|quota|429|404/i.test(aiText);
    if (state.show_ai_card && !clearAll && aiText && !aiBad) {
      const el = ensureLayer("ai", "l-ai");
      el.dataset.hidden = "0";
      placeLayer(el, state.ai_x || 50, state.ai_y || 30, state.ai_width || 72, state.ai_height || 40);
      const inner = '<div class="ttl">KI-Check</div><div class="body">' + escapeHtml(aiText) + '</div>';
      if (el.innerHTML !== inner) el.innerHTML = inner;
    } else {
      removeLayer("ai");
    }

    // Motion layers
    const activeMotion = new Set(state.motion_effects || []);
    document.querySelectorAll(".motion").forEach(m => {
      const want = state.show_animations !== false && state.show_motion_layers !== false && activeMotion.has(m.dataset.effect);
      m.dataset.hidden = want ? "0" : "1";
    });

    // Heatmap
    if (state.show_heatmap && !clearAll && state.sentiment) {
      heatEl.dataset.hidden = "0";
      const op = (state.heatmap_opacity || 30) / 100 * Math.max(.4, state.sentiment.intensity || .5);
      r.style.setProperty("--heatOpacity", op);
      const label = state.sentiment.label || "neutral";
      const color = label === "positiv" ? "rgba(110,255,160,.5)" : label === "angespannt" ? "rgba(255,90,90,.5)" : "rgba(180,180,180,.4)";
      r.style.setProperty("--heatColor", color);
    } else {
      heatEl.dataset.hidden = "1";
    }

    // Edit-mode handles
    if (editMode) updateEditHandles(state);

    // Debug badge
    if (debugMode) {
      statusBadge.style.display = "block";
      const cnt = (state.keywords || []).length;
      statusBadge.textContent = "room=" + (state.room_id || room) + " kw=" + cnt + " scenes=" + (state.scenes_count || 0) + " upd=" + (state.updated_at ? new Date(state.updated_at * 1000).toLocaleTimeString() : "-");
    }
  }

  // ---- Edit-mode handles ------------------------------------------------
  const EDITABLES = [
    { id: "topic", show: "show_topic", x: "topic_x", y: "topic_y", w: "topic_width", h: "topic_height", label: "Topic", minW: 18, minH: 8 },
    { id: "highlight", show: "show_highlight", x: "highlight_x", y: "highlight_y", w: "highlight_width", h: "highlight_height", label: "Highlight", minW: 16, minH: 8 },
    { id: "cloud", show: "show_cloud", x: "cloud_pos_x", y: "cloud_pos_y", w: "cloud_width", h: "cloud_height", label: "Cloud", minW: 35, minH: 35 },
    { id: "countdown", show: "show_countdown", x: "countdown_x", y: "countdown_y", w: "countdown_width", h: "countdown_height", label: "Countdown", minW: 18, minH: 8 },
    { id: "clock", show: "show_clock", x: "clock_x", y: "clock_y", w: "clock_width", h: "clock_height", label: "Uhr", minW: 12, minH: 6 },
    { id: "video", show: "show_video", x: "video_x", y: "video_y", w: "video_width", h: "video_height", label: "Video", minW: 15, minH: 10 },
    { id: "website", show: "show_website", x: "website_x", y: "website_y", w: "website_width", h: "website_height", label: "Website", minW: 20, minH: 15 },
    { id: "pdf", show: "show_pdf", x: "pdf_x", y: "pdf_y", w: "pdf_width", h: "pdf_height", label: "PDF", minW: 20, minH: 20 },
    { id: "ai", show: "show_ai", x: "ai_x", y: "ai_y", w: "ai_width", h: "ai_height", label: "KI-Karte", minW: 20, minH: 12 },
  ];

  function updateEditHandles(state) {
    EDITABLES.forEach(spec => {
      const id = "h-" + spec.id;
      let h = editHandles.querySelector('[data-handle="' + spec.id + '"]');
      const visible = spec.id === "ai" ? !!(state.show_ai_card && state.ai_response)
                    : spec.id === "highlight" ? !!(state.show_highlight && state.highlight_word)
                    : !!state[spec.show];
      if (!visible) { if (h) h.remove(); return; }
      if (!h) {
        h = document.createElement("div");
        h.className = "edit-handle";
        h.dataset.handle = spec.id;
        h.innerHTML = '<div class="label">' + spec.label + '</div><button class="hide-btn" title="Layer ausblenden">×</button><div class="resize"></div>';
        editHandles.appendChild(h);
        wireDrag(h, spec);
      }
      const x = state[spec.x] || 50, y = state[spec.y] || 50;
      const w = state[spec.w] || 30, ht = state[spec.h] || 20;
      h.style.left = pct(x);
      h.style.top = pct(y);
      h.style.width = pct(w);
      h.style.height = pct(ht);
    });
  }

  function wireDrag(handle, spec) {
    const stageRect = () => stage.getBoundingClientRect();
    let mode = null;
    let startX = 0, startY = 0;
    let startLeft = 0, startTop = 0, startW = 0, startH = 0;

    const onDown = (ev) => {
      const isResize = ev.target.classList && ev.target.classList.contains("resize");
      const isHide = ev.target.classList && ev.target.classList.contains("hide-btn");
      if (isHide) {
        ev.preventDefault();
        ev.stopPropagation();
        sendUpdate(spec.id, { hide: true });
        return;
      }
      mode = isResize ? "resize" : "move";
      ev.preventDefault();
      const rect = stageRect();
      startX = ev.clientX; startY = ev.clientY;
      startLeft = parseFloat(handle.style.left) || 50;
      startTop = parseFloat(handle.style.top) || 50;
      startW = parseFloat(handle.style.width) || 30;
      startH = parseFloat(handle.style.height) || 20;
      handle.setPointerCapture && handle.setPointerCapture(ev.pointerId);
      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp, { once: true });
    };
    const onMove = (ev) => {
      if (!mode) return;
      const rect = stageRect();
      const dxPct = ((ev.clientX - startX) / rect.width) * 100;
      const dyPct = ((ev.clientY - startY) / rect.height) * 100;
      if (mode === "move") {
        const nx = Math.max(2, Math.min(98, startLeft + dxPct));
        const ny = Math.max(2, Math.min(98, startTop + dyPct));
        handle.style.left = nx + "%";
        handle.style.top = ny + "%";
        const el = layers.querySelector('[data-id="' + spec.id + '"]');
        if (el) { el.style.left = nx + "%"; el.style.top = ny + "%"; }
      } else if (mode === "resize") {
        const nw = Math.max(spec.minW, Math.min(100, startW + dxPct * 2));
        const nh = Math.max(spec.minH, Math.min(100, startH + dyPct * 2));
        handle.style.width = nw + "%";
        handle.style.height = nh + "%";
        const el = layers.querySelector('[data-id="' + spec.id + '"]');
        if (el) { el.style.width = nw + "%"; el.style.height = nh + "%"; }
      }
    };
    const onUp = () => {
      window.removeEventListener("pointermove", onMove);
      const x = parseFloat(handle.style.left) || 50;
      const y = parseFloat(handle.style.top) || 50;
      const w = parseFloat(handle.style.width) || 30;
      const ht = parseFloat(handle.style.height) || 20;
      sendUpdate(spec.id, { x: Math.round(x), y: Math.round(y), w: Math.round(w), h: Math.round(ht) });
      mode = null;
    };
    handle.addEventListener("pointerdown", onDown);
  }

  function sendUpdate(id, payload) {
    const msg = { type: "ttl-stage-edit", id: id, payload: payload, t: Date.now() };
    try {
      // Stash in localStorage so a fresh Streamlit rerun can pick it up
      const queue = JSON.parse(localStorage.getItem("ttl_stage_edit_queue") || "[]");
      queue.push(msg);
      // Keep only last 30 edits to bound size
      while (queue.length > 30) queue.shift();
      localStorage.setItem("ttl_stage_edit_queue", JSON.stringify(queue));
    } catch (e) {}
    try { if (window.parent && window.parent !== window) window.parent.postMessage(msg, "*"); } catch (e) {}
  }

  // ---- Polling loop -----------------------------------------------------
  let pollTimer = null;
  let pollInterval = 2000;
  let backoff = 0;
  let lastUpdated = 0;

  async function poll() {
    const url = "overlay_state_" + encodeURIComponent(room) + ".json?_=" + Date.now();
    try {
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) {
        // Try default fallback
        const r2 = await fetch("overlay_state_default.json?_=" + Date.now(), { cache: "no-store" });
        if (!r2.ok) throw new Error("HTTP " + r.status);
        const data2 = await r2.json();
        render(data2);
      } else {
        const data = await r.json();
        if (!data.updated_at || data.updated_at !== lastUpdated) {
          lastUpdated = data.updated_at || lastUpdated;
          render(data);
        } else {
          // tick clock anyway
          if (data.show_clock) render(data);
        }
      }
      backoff = 0;
      pollInterval = 2000;
    } catch (e) {
      backoff = Math.min(8, backoff + 1);
      pollInterval = 2000 * Math.pow(1.5, backoff);
      if (debugMode) {
        statusBadge.style.display = "block";
        statusBadge.textContent = "Polling-Fehler (Backoff " + backoff + "): " + e.message;
      }
    }
    pollTimer = setTimeout(poll, pollInterval);
  }
  poll();

  // Tick clock every second by re-rendering last state if available
  setInterval(() => {
    if (window.__ttlLast) render(window.__ttlLast);
  }, 1000);
})();
</script>
</body>
</html>
